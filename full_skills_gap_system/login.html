<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Digital Skills Gap Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===============================
   GLOBAL RESET
================================ */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Tahoma, Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===============================
   CONTAINER
================================ */
.login-container{
    display:flex;
    width:900px;
    max-width:95%;
    background:#ffffff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* ===============================
   LEFT SIDE (WELCOME PANEL)
================================ */
.left-panel{
    width:50%;
    background:linear-gradient(180deg,#4c51bf,#6b46c1);
    color:white;
    padding:50px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left-panel h1{
    font-size:28px;
    margin-bottom:20px;
}

.left-panel p{
    font-size:16px;
    line-height:1.6;
    margin-bottom:15px;
}

.motto{
    margin-top:20px;
    font-style:italic;
    font-size:18px;
}

/* ===============================
   RIGHT SIDE (LOGIN FORM)
================================ */
.right-panel{
    width:50%;
    padding:50px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right-panel h2{
    text-align:center;
    margin-bottom:25px;
    color:#4c51bf;
}

/* INPUTS */
input{
    width:100%;
    padding:12px 14px;
    margin-top:15px;
    border-radius:6px;
    border:1px solid #cbd5e0;
    font-size:15px;
    transition:0.3s ease;
}

input:focus{
    outline:none;
    border-color:#667eea;
    box-shadow:0 0 0 2px rgba(102,126,234,0.2);
}

/* BUTTON */
button{
    margin-top:25px;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    transition:0.3s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* REGISTER LINK */
.register-link{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.register-link a{
    color:#667eea;
    font-weight:bold;
    text-decoration:none;
}

.register-link a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */
@media(max-width:850px){
    .login-container{
        flex-direction:column;
    }

    .left-panel, .right-panel{
        width:100%;
    }

    .left-panel{
        text-align:center;
    }
}

</style>
</head>

<body>

<div class="login-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <h1>Digital Skills Gap MIS</h1>
        <p>
            Assess your digital skills, identify knowledge gaps,
            and receive personalized recommendations to improve
            from Beginner to Advanced level.
        </p>
        <p>
            Start your journey toward digital excellence today.
        </p>

        <div class="motto">
            "Identify. Improve. Excel."
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">
        <h2>User Login</h2>

        <form action="auth/login_user.php" method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            Don’t have an account?
            <a href="register.html">Register</a>
        </div>
    </div>

</div>

</body>
</html>
